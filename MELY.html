<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAREINA MELY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0a0a0c;
    color:#fff;
}

/* NAV */
nav{
    position:sticky;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 20px;
    background:rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    z-index:1000;
}

.logo{
    font-weight:700;
    letter-spacing:3px;
    font-size:14px;
}

.cart-box{
    background:#fff;
    color:#000;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}

/* HERO BANNER */
.hero{
    height:320px;
    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.85)),
        url("https://i.ibb.co.com/qMRfSKPw/DSC07509.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:28px;
    letter-spacing:4px;
    font-weight:600;
}

.hero p{
    margin-top:8px;
    opacity:0.7;
    font-size:13px;
}

/* SECTION TITLE */
.section-title{
    text-align:center;
    padding:30px 20px 10px;
    font-size:16px;
    letter-spacing:3px;
    opacity:0.8;
}

/* PRODUCT GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:linear-gradient(145deg,#141416,#0a0a0c);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-4px);
    border:1px solid rgba(255,255,255,0.2);
}

.card img{
    width:100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    object-position: center;
    display:block;
}

.card h3{
    margin:10px 12px;
    font-size:14px;
    letter-spacing:1px;
}

/* SELECT */
select{
    width:90%;
    margin:5px 12px;
    padding:8px;
    background:#111;
    border:none;
    color:#fff;
    border-radius:8px;
    font-size:12px;
}

/* BUTTON GROUP */
.btn-group{
    display:flex;
    gap:8px;
    padding:10px 12px;
}

button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:0.2s;
}

.add{
    background:#fff;
    color:#000;
}

.remove{
    background:#222;
    color:#fff;
}

button:hover{
    transform:scale(1.02);
}

/* CHECKOUT */
.checkout-btn{
    width:92%;
    margin:25px auto;
    display:block;
    padding:14px;
    background:linear-gradient(90deg,#ffffff,#cfcfcf);
    border:none;
    border-radius:14px;
    font-weight:700;
    cursor:pointer;
}

/* FOOTER */
footer{
    text-align:center;
    padding:25px;
    font-size:11px;
    opacity:0.5;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">VAREINA MELY</div>
    <div class="cart-box">🛒 <span id="cartCount">0</span></div>
</nav>

<!-- HERO BANNER -->
<div class="hero">
    <h1>VAREINA MELY</h1>
    <p>Elegant • Minimal • Luxury Collection</p>
</div>

<div class="section-title">NEW ARRIVAL</div>

<!-- PRODUCTS -->
<div class="container">

<!-- PRODUCT 1 -->
<!-- PRODUCT 1 -->
<div class="card">
    <img src="https://i.ibb.co.com/mF4Ngg5z/DSC07505.jpg">
    <h3>MELY MAROON</h3>
<select id="size1" style="width:90%;margin:5px 12px;padding:8px;background:#111;color:#fff;border:none;border-radius:8px;">
    <option value="36">Size 36</option>
    <option value="37">Size 37</option>
    <option value="38">Size 38</option>
    <option value="39">Size 39</option>
    <option value="40">Size 40</option>
    <option value="41">Size 41</option>
</select>
    <div class="btn-group">
        <button class="remove" onclick="changeQty('p1',-1)">-</button>
        <button class="add" onclick="changeQty('p1',1)">+</button>
    </div>
</div>

<!-- PRODUCT 2 -->
<div class="card">
    <img src="https://i.ibb.co.com/XxTQGQYm/DSC07504.jpg">
    <h3>MELY HITAM</h3>
<select id="size1" style="width:90%;margin:5px 12px;padding:8px;background:#111;color:#fff;border:none;border-radius:8px;">
    <option value="36">Size 36</option>
    <option value="37">Size 37</option>
    <option value="38">Size 38</option>
    <option value="39">Size 39</option>
    <option value="40">Size 40</option>
    <option value="41">Size 41</option>
</select>
    <div class="btn-group">
        <button class="remove" onclick="changeQty('p2',-1)">-</button>
        <button class="add" onclick="changeQty('p2',1)">+</button>
    </div>
</div>

<!-- PRODUCT 3 -->
<div class="card">
    <img src="https://i.ibb.co.com/C5n6GXMC/DSC07503.jpg">
    <h3>MELY CREAM</h3>
<select id="size1" style="width:90%;margin:5px 12px;padding:8px;background:#111;color:#fff;border:none;border-radius:8px;">
    <option value="36">Size 36</option>
    <option value="37">Size 37</option>
    <option value="38">Size 38</option>
    <option value="39">Size 39</option>
    <option value="40">Size 40</option>
    <option value="41">Size 41</option>
</select>
    <div class="btn-group">
        <button class="remove" onclick="changeQty('p3',-1)">-</button>
        <button class="add" onclick="changeQty('p3',1)">+</button>
    </div>
</div>

</div>

<button class="checkout-btn" onclick="checkoutAll()">CHECKOUT WHATSAPP</button>

<footer>
© 2026 VAREINA MELY • Luxury Fashion Brand
</footer>

<script>

let cart = {
    p1:{name:"VAREINA MELY 01", qty:0, color:"color1"},
    p2:{name:"VAREINA MELY 02", qty:0, color:"color2"},
    p3:{name:"VAREINA MELY 03", qty:0, color:"color3"}
};

function changeQty(p, val){
    cart[p].qty += val;
    if(cart[p].qty < 0) cart[p].qty = 0;
    updateCart();
}

function updateCart(){
    let total = 0;
    for(let i in cart){
        total += cart[i].qty;
    }
    document.getElementById("cartCount").innerText = total;
}

function checkoutAll(){

    let phone = "6289639495706";
    let message = "✨ VAREINA MELY ORDER ✨\n\n";

    let hasItem = false;

    for(let i in cart){
        let item = cart[i];

        if(item.qty > 0){
            message += `${item.name}\nQty: ${item.qty}\n\n`;
            hasItem = true;
        }
    }

    if(!hasItem){
        alert("Keranjang masih kosong!");
        return;
    }

    message += "Mohon konfirmasi stok & total harga 🙏";

    let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

    // FIX: lebih kompatibel daripada window.open
    window.location.href = url;
}

</script>

</body>
</html>
